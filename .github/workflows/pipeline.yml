name: CI Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    # from https://docs.astral.sh/ruff/integrations/#github-actions
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      # Update output format to enable automatic inline annotations.
      - name: Run Ruff
        run: ruff check --output-format=github .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Test with pytest
        # from: https://docs.github.com/en/actions/tutorials/build-and-test-code/python#testing-with-pytest-and-pytest-cov
        run: |
          python -m pytest -v tests/ --junitxml=junit/test-results.xml

      # from: https://github.com/actions/upload-artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: junit/test-results.xml

      - name: Run adls_client.py end-to-end
        run: |
          python src/adls_client.py
